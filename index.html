<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>AIK - Wellness Check-in</title>
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&display=swap" rel="stylesheet"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.22.5/babel.min.js"></script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%;background:#f0f3f8}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;-webkit-tap-highlight-color:transparent}
    select,input,textarea,button{font-family:inherit;-webkit-appearance:none}
    .fade{animation:fadeUp .22s ease}
    @keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
var useState = React.useState;
var useEffect = React.useEffect;

// ── CONFIG ────────────────────────────────────────────────
var PIN = "1234";
var SHEET_URL = "https://script.google.com/macros/s/AKfycbxrdFNChgE1qdk-KDpnuUqvZwqxLr7PBByFFH57OhBGRJdGuEDqKeMybX2XDqPVJw08Rw/exec";
var PLAYERS_KEY = "aik-wellness-players";
var SUBS_KEY    = "aik-wellness-subs";

var DEFAULT_PLAYERS = [
  "Abdihakim Ali","Adrian Helm","Ahmad Faqa","Amel Mujanic","Andreas Redkin",
  "Aron Csongvai","Axel Kouame","Bersant Celina","Charlie Pavey","Dino Besirovic",
  "Erik Flataker","Eskil Edh","Fredrik Nissen","Ibrahim Cisse","Johan Hove",
  "Kalle Joelsson","Kevin Filling","Kristoffer Nordfeldt","Linus Jareteg","Lukas Bergquist",
  "Mads Thychosen","Martin Ellingsen","Mohammed Ismael Shila","Norton Otterud",
  "Sixten Gustafsson","Sotirios Papagiannopoulos","Stanley Wilson","Taha Ayari",
  "Victor Andersson","Yannick Geiger","Zadok Yohanna"
];

var PAIRED  = ["Shoulder","Upper Arm","Elbow","Forearm","Wrist / Hand","Hip / Groin","Quad","Hamstring","Knee","Calf","Shin","Ankle","Foot"];
var CENTRAL = ["Head","Neck","Upper Back","Lower Back","Chest","Abdomen"];
var ILLNESS = ["Cold / Flu","Sore Throat","Stomach / GI","Fever","Fatigue / Low energy","Allergy","Other"];
var PAIN_T  = ["Sharp","Dull","Aching","Tightness","Burning","Other"];
var HOURS   = ["<5","5","5.5","6","6.5","7","7.5","8","8.5","9","9+"];

// ── COLOURS ───────────────────────────────────────────────
var navy="#0f1f3d", yellow="#FFE135", gold="#8B7340", goldLight="#c9a84c";
var bg="#f0f3f8", white="#ffffff", border="#dce3ef", muted="#64748b", faint="#f4f6fb";
var red="#dc2626", amber="#d97706", green="#16a34a";
var DISP = "'Oswald','Impact',sans-serif";

// ── HELPERS ───────────────────────────────────────────────
function scoreCol(v){ return v>=4?green:v===3?amber:red; }

function isFlagged(s){
  var pd=s.painData||{};
  return s.fatigue<=2||s.sleepQuality<=2||s.soreness<=2||s.appetite<=2||pd.hasPain||pd.illness||s.readyToTrain==="no";
}

function avgVal(subs,key){
  if(!subs.length) return "—";
  return (subs.reduce(function(a,s){return a+s[key];},0)/subs.length).toFixed(1);
}

function todayStr(){
  return new Date().toLocaleDateString("en-GB",{weekday:"long",day:"numeric",month:"long",year:"numeric"});
}
function nowTime(){
  return new Date().toLocaleTimeString("en-GB",{hour:"2-digit",minute:"2-digit"});
}

function todayDate(){
  return new Date().toISOString().split("T")[0];
}
function loadLS(key,def){
  try{var v=localStorage.getItem(key);return v?JSON.parse(v):def;}
  catch(e){return def;}
}
function saveLS(key,val){
  try{localStorage.setItem(key,JSON.stringify(val));}catch(e){}
}
// Load subs only if they are from today — clears automatically each new day
function loadTodaySubs(){
  try{
    var stored=localStorage.getItem(SUBS_KEY);
    if(!stored) return [];
    var parsed=JSON.parse(stored);
    if(!parsed.length) return [];
    // Clear if no date field OR date is not today
    if(!parsed[0].date || parsed[0].date !== todayDate()){
      localStorage.removeItem(SUBS_KEY);
      return [];
    }
    return parsed;
  } catch(e){
    localStorage.removeItem(SUBS_KEY);
    return [];
  }
}

function sendToSheet(sub){
  if(!SHEET_URL) return;
  var pd=sub.painData||{};
  var areas=(pd.muscles||[]).concat(pd.central||[]).join("; ");
      fetch(SHEET_URL,{
    method:"POST",mode:"no-cors",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      date:sub.date||todayDate(),
      player:sub.player,timestamp:sub.timestamp,
      fatigue:sub.fatigue,sleepQuality:sub.sleepQuality,hoursSlept:sub.hoursSlept||"",
      appetite:sub.appetite,soreness:sub.soreness,
      pain:pd.hasPain?"Yes":"No",painSide:pd.side||"",
      painAreas:areas,painType:(pd.painType||[]).join("; "),
      illness:pd.illness?"Yes":"No",illnessTypes:(pd.illnessTypes||[]).join("; "),
      readyToTrain:sub.readyToTrain,comments:sub.comments||""
    })
  }).catch(function(){});
}

// ── PRIMITIVES ────────────────────────────────────────────
function ProgressBar(props){
  var pct=Math.round((props.current/props.total)*100);
  return (
    <div style={{marginBottom:24}}>
      <div style={{display:"flex",justifyContent:"space-between",fontSize:12,color:muted,marginBottom:8,fontWeight:600}}>
        <span style={{color:navy}}>{props.label}</span>
        <span>{pct+"%"}</span>
      </div>
      <div style={{background:border,borderRadius:99,height:6,overflow:"hidden"}}>
        <div style={{background:navy,height:6,borderRadius:99,width:pct+"%",transition:"width .35s ease"}}/>
      </div>
    </div>
  );
}

function Card(props){
  return (
    <div className="fade" style={{background:white,borderRadius:20,padding:"26px 20px",
      boxShadow:"0 2px 16px rgba(15,31,61,0.10)",marginBottom:16}}>
      {props.children}
    </div>
  );
}

function QTitle(props){
  return (
    <div style={{marginBottom:20}}>
      <div style={{fontSize:11,fontWeight:700,color:muted,letterSpacing:1,textTransform:"uppercase",marginBottom:6}}>{props.sub}</div>
      <div style={{fontSize:20,fontWeight:700,color:navy,lineHeight:1.35}}>{props.title}</div>
    </div>
  );
}

var SCALE_LABELS = [
  ["1","Very\nBad"],["2","Bad"],["3","Okay"],["4","Good"],["5","Very\nGood"]
];

function ScaleRow(props){
  var labels = props.labels || SCALE_LABELS;
  return (
    <div style={{display:"flex",gap:8}}>
      {[1,2,3,4,5].map(function(v){
        var col=scoreCol(v),sel=props.value===v;
        var lbl=labels[v-1];
        return (
          <button key={v} onClick={function(){props.onChange(v);}} style={{
            flex:1,padding:"14px 4px 12px",borderRadius:12,
            border:"2px solid "+(sel?col:border),
            background:sel?col:faint,cursor:"pointer",
            transition:"all .12s",display:"flex",
            flexDirection:"column",alignItems:"center",gap:6
          }}>
            <span style={{fontWeight:800,fontSize:22,lineHeight:1,
              color:sel?"#fff":navy}}>{lbl[0]}</span>
            <span style={{fontSize:10,fontWeight:600,color:sel?"rgba(255,255,255,0.85)":muted,
              textAlign:"center",lineHeight:1.3,whiteSpace:"pre-line"}}>{lbl[1]}</span>
          </button>
        );
      })}
    </div>
  );
}

function ChoiceRow(props){
  return (
    <div style={{display:"flex",gap:10}}>
      {props.options.map(function(opt){
        var v=opt[0],label=opt[1],col=opt[2],sel=props.value===v;
        return (
          <button key={v} onClick={function(){props.onChange(v);}} style={{
            flex:1,padding:"18px 8px",borderRadius:14,
            border:"2px solid "+(sel?col:border),
            background:sel?col:faint,
            color:sel?"#fff":muted,fontWeight:700,fontSize:15,cursor:"pointer",transition:"all .12s"
          }}>{label}</button>
        );
      })}
    </div>
  );
}

function Chip(props){
  var sel=props.selected,col=props.color||navy;
  return (
    <button onClick={props.onClick} style={{
      padding:"8px 14px",borderRadius:20,margin:"0 4px 6px 0",
      border:"1.5px solid "+(sel?col:border),
      background:sel?col+"15":faint,
      color:sel?col:muted,fontSize:13,cursor:"pointer",fontWeight:sel?700:400,transition:"all .12s"
    }}>{props.label}</button>
  );
}

function Lbl(props){
  return <div style={{fontSize:11,fontWeight:700,color:muted,marginBottom:8,textTransform:"uppercase",letterSpacing:0.5}}>{props.children}</div>;
}

function NavButtons(props){
  return (
    <div style={{display:"flex",gap:10,marginTop:24}}>
      {props.onBack&&(
        <button onClick={props.onBack} style={{
          flex:1,padding:"15px",borderRadius:14,
          border:"1.5px solid "+border,background:white,color:muted,
          fontFamily:DISP,fontSize:16,fontWeight:600,cursor:"pointer"
        }}>BACK</button>
      )}
      <button onClick={props.onNext} disabled={props.disabled} style={{
        flex:2,padding:"15px",borderRadius:14,border:"none",
        background:props.disabled?faint:navy,
        color:props.disabled?muted:yellow,
        fontFamily:DISP,fontSize:16,fontWeight:700,letterSpacing:1,
        cursor:props.disabled?"default":"pointer",transition:"all .12s"
      }}>{props.nextLabel||"CONTINUE →"}</button>
    </div>
  );
}

function MiniPill(props){
  var col=scoreCol(props.value);
  return (
    <div style={{display:"inline-flex",alignItems:"center",gap:5,
      background:col+"15",borderRadius:20,padding:"5px 11px",marginRight:6,marginBottom:4}}>
      <span style={{fontSize:11,color:muted}}>{props.label}</span>
      <span style={{fontSize:13,fontWeight:800,color:col}}>{props.value}</span>
    </div>
  );
}

function Tag(props){
  var col=props.col;
  return <span style={{background:col+"15",color:col,padding:"4px 10px",borderRadius:16,
    fontSize:12,fontWeight:700,border:"1px solid "+col+"30",marginRight:4,marginBottom:4,display:"inline-block"}}>{props.children}</span>;
}

function ScorePill(props){
  var col=typeof props.value==="number"?scoreCol(props.value):muted;
  return (
    <div style={{textAlign:"center",background:col+"12",borderRadius:10,padding:"10px 6px",border:"1.5px solid "+col+"30"}}>
      <div style={{fontSize:9,color:col,fontWeight:800,textTransform:"uppercase",letterSpacing:0.5}}>{props.label}</div>
      <div style={{fontSize:22,fontWeight:900,color:col,lineHeight:1.2,marginTop:3}}>{props.value}</div>
    </div>
  );
}

// ── PLAYER FLOW ───────────────────────────────────────────
function PlayerFlow(props){
  var players=props.players, subs=props.subs, onSubmit=props.onSubmit;
  var stepS=useState(0); var step=stepS[0],setStep=stepS[1];
  var emptyPain={hasPain:false,side:null,muscles:[],central:[],painType:[],illness:false,illnessTypes:[]};
  var fS=useState({player:"",fatigue:null,sleepQuality:null,hoursSlept:"",appetite:null,soreness:null,painData:emptyPain,comments:"",readyToTrain:null});
  var f=fS[0],setF=fS[1];

  function set(k,v){
    setF(function(prev){
      var n={};Object.keys(prev).forEach(function(key){n[key]=prev[key];});n[k]=v;return n;
    });
  }
  function next(){setStep(function(s){return s+1;});}
  function back(){setStep(function(s){return s-1;});}
  function setPD(newPd){set("painData",newPd);}
  function toggleArr(k,item){
    var pd=f.painData;
    var arr=pd[k]||[];
    var next=arr.indexOf(item)>=0?arr.filter(function(x){return x!==item;}):arr.concat([item]);
    var np={};Object.keys(pd).forEach(function(key){np[key]=pd[key];});np[k]=next;
    set("painData",np);
  }
  function submitForm(){onSubmit(f);setStep(10);}

  var TOTAL=8;
  var pd=f.painData;
  var hasSided=pd.side==="left"||pd.side==="right"||pd.side==="both";
  var alreadyDone=f.player&&subs.some(function(s){return s.player===f.player;});

  // DONE
  if(step===10) return (
    <div className="fade" style={{textAlign:"center",padding:"56px 16px"}}>
      <div style={{width:88,height:88,borderRadius:"50%",background:green+"15",
        border:"3px solid "+green,display:"flex",alignItems:"center",
        justifyContent:"center",margin:"0 auto 24px",fontSize:42}}>✅</div>
      <div style={{fontFamily:DISP,fontSize:34,fontWeight:700,color:navy,letterSpacing:1}}>ALL DONE!</div>
      <div style={{color:muted,fontSize:16,margin:"12px 0 36px"}}>{"Thanks "+f.player.split(" ")[0]+", have a great session! 💪"}</div>
      <button onClick={function(){setStep(0);setF({player:"",fatigue:null,sleepQuality:null,hoursSlept:"",appetite:null,soreness:null,painData:emptyPain,comments:"",readyToTrain:null});}}
        style={{padding:"15px 40px",background:navy,color:yellow,border:"none",
          borderRadius:14,fontFamily:DISP,fontSize:16,fontWeight:700,letterSpacing:1,cursor:"pointer"}}>
        BACK TO START
      </button>
    </div>
  );

  // NAME SELECT (step 0)
  if(step===0) return (
    <div className="fade">
      <div style={{textAlign:"center",marginBottom:28,padding:"28px 20px",
        background:navy,borderRadius:20,boxShadow:"0 4px 20px rgba(15,31,61,0.18)"}}>
        <div style={{fontFamily:DISP,fontSize:46,fontWeight:700,color:yellow,letterSpacing:4,lineHeight:1}}>AIK</div>
        <div style={{color:goldLight,fontSize:13,fontWeight:600,marginTop:8,letterSpacing:2}}>WELLNESS CHECK-IN</div>
        <div style={{color:"#7b93bc",fontSize:12,marginTop:6}}>{todayStr()}</div>
      </div>
      <Card>
        <div style={{fontSize:12,color:muted,fontWeight:700,letterSpacing:0.5,
          textTransform:"uppercase",marginBottom:10}}>Select your name</div>
        <select value={f.player} onChange={function(e){set("player",e.target.value);}}
          style={{width:"100%",padding:"15px 16px",borderRadius:12,fontSize:16,
            border:"1.5px solid "+(f.player?navy:border),
            background:faint,color:f.player?navy:muted,outline:"none",marginBottom:16}}>
          <option value="">Choose your name...</option>
          {players.map(function(p){
            var done=subs.some(function(s){return s.player===p;});
            return <option key={p} value={p}>{done?"✓  "+p:p}</option>;
          })}
        </select>
        {alreadyDone&&(
          <div style={{background:amber+"15",border:"1px solid "+amber+"40",borderRadius:10,
            padding:"10px 14px",marginBottom:16,fontSize:13,color:amber,fontWeight:500}}>
            You already submitted today — continuing will update your entry.
          </div>
        )}
        <button onClick={next} disabled={!f.player} style={{
          width:"100%",padding:"16px",borderRadius:14,border:"none",
          background:f.player?navy:faint,color:f.player?yellow:muted,
          fontFamily:DISP,fontSize:18,fontWeight:700,letterSpacing:1,
          cursor:f.player?"pointer":"default"
        }}>{alreadyDone?"UPDATE CHECK-IN":"START CHECK-IN →"}</button>
      </Card>
    </div>
  );

  // QUESTIONS 1-8
  return (
    <div>
      {/* Progress header */}
      <div style={{background:white,borderRadius:16,padding:"16px 18px",
        marginBottom:16,boxShadow:"0 1px 6px rgba(15,31,61,0.07)"}}>
        <ProgressBar current={step} total={TOTAL} label={"Question "+step+" of "+TOTAL}/>
        {/* Mini summary pills */}
        {step>1&&(
          <div style={{display:"flex",flexWrap:"wrap",marginTop:4}}>
            {f.fatigue&&<MiniPill label="Fatigue" value={f.fatigue}/>}
            {f.sleepQuality&&<MiniPill label="Sleep" value={f.sleepQuality}/>}
            {f.appetite&&<MiniPill label="Appetite" value={f.appetite}/>}
            {f.soreness&&<MiniPill label="Soreness" value={f.soreness}/>}
          </div>
        )}
      </div>

      <Card>
        {/* Q1 Fatigue */}
        {step===1&&(
          <div>
            <QTitle sub="Question 1 of 8" title="How energised do you feel right now?"/>
            <ScaleRow value={f.fatigue} onChange={function(v){set("fatigue",v);}} labels={[["1","Exhausted"],["2","Tired"],["3","Okay"],["4","Good"],["5","Energised"]]}/>
            <NavButtons onBack={back} onNext={next} disabled={!f.fatigue}/>
          </div>
        )}
        {/* Q2 Sleep */}
        {step===2&&(
          <div>
            <QTitle sub="Question 2 of 8" title="How well did you sleep last night?"/>
            <ScaleRow value={f.sleepQuality} onChange={function(v){set("sleepQuality",v);}} labels={[["1","Very\nPoor"],["2","Poor"],["3","Okay"],["4","Good"],["5","Excellent"]]}/>
            <div style={{marginTop:22}}>
              <Lbl>Hours slept (optional)</Lbl>
              <div style={{display:"flex",flexWrap:"wrap",gap:7}}>
                {HOURS.map(function(h){
                  var sel=f.hoursSlept===h;
                  return (
                    <button key={h} onClick={function(){set("hoursSlept",sel?"":h);}} style={{
                      padding:"9px 13px",borderRadius:10,
                      border:"1.5px solid "+(sel?navy:border),
                      background:sel?navy:faint,color:sel?white:muted,
                      fontSize:13,fontWeight:sel?700:400,cursor:"pointer"
                    }}>{h}</button>
                  );
                })}
              </div>
            </div>
            <NavButtons onBack={back} onNext={next} disabled={!f.sleepQuality}/>
          </div>
        )}
        {/* Q3 Appetite */}
        {step===3&&(
          <div>
            <QTitle sub="Question 3 of 8" title="How is your appetite today?"/>
            <ScaleRow value={f.appetite} onChange={function(v){set("appetite",v);}} labels={[["1","Very\nPoor"],["2","Poor"],["3","Okay"],["4","Good"],["5","Very\nGood"]]}/>
            <NavButtons onBack={back} onNext={next} disabled={!f.appetite}/>
          </div>
        )}
        {/* Q4 Soreness */}
        {step===4&&(
          <div>
            <QTitle sub="Question 4 of 8" title="How do your muscles feel today?"/>
            <ScaleRow value={f.soreness} onChange={function(v){set("soreness",v);}} labels={[["1","Very\nSore"],["2","Sore"],["3","Okay"],["4","Good"],["5","No\nSoreness"]]}/>
            <NavButtons onBack={back} onNext={next} disabled={!f.soreness}/>
          </div>
        )}
        {/* Q5 Pain */}
        {step===5&&(
          <div>
            <QTitle sub="Question 5 of 8" title="Do you have any pain or discomfort?"/>
            <ChoiceRow value={pd.hasPain?"yes":"no"}
              onChange={function(v){
                var np={hasPain:v==="yes",side:null,muscles:[],central:[],painType:[],illness:pd.illness,illnessTypes:pd.illnessTypes};
                set("painData",np);
              }}
              options={[["yes","⚠️ Yes",red],["no","✅ No",green]]}/>
            {pd.hasPain&&(
              <div style={{marginTop:20,display:"flex",flexDirection:"column",gap:16}}>
                <div>
                  <Lbl>Side affected</Lbl>
                  <div style={{display:"flex",gap:8}}>
                    {[["left","← Left"],["both","Both"],["right","Right →"],["central","Central"]].map(function(pair){
                      var v=pair[0],l=pair[1],sel=pd.side===v;
                      return (
                        <button key={v} onClick={function(){
                          var np={};Object.keys(pd).forEach(function(k){np[k]=pd[k];});
                          np.side=pd.side===v?null:v;np.muscles=[];np.central=[];
                          set("painData",np);
                        }} style={{flex:1,padding:"12px 4px",borderRadius:10,
                          border:"1.5px solid "+(sel?red:border),
                          background:sel?red+"12":faint,color:sel?red:muted,
                          fontWeight:sel?700:400,fontSize:12,cursor:"pointer"}}>{l}</button>
                      );
                    })}
                  </div>
                </div>
                {hasSided&&(
                  <div>
                    <Lbl>Muscle / Area</Lbl>
                    <div>{PAIRED.map(function(m){return <Chip key={m} label={m} color={red} selected={(pd.muscles||[]).indexOf(m)>=0} onClick={function(){toggleArr("muscles",m);}}/>;})}</div>
                  </div>
                )}
                {pd.side==="central"&&(
                  <div>
                    <Lbl>Area</Lbl>
                    <div>{CENTRAL.map(function(m){return <Chip key={m} label={m} color={red} selected={(pd.central||[]).indexOf(m)>=0} onClick={function(){toggleArr("central",m);}}/>;})}</div>
                  </div>
                )}
                {pd.side&&(
                  <div>
                    <Lbl>Type of pain</Lbl>
                    <div>{PAIN_T.map(function(t){return <Chip key={t} label={t} color={red} selected={(pd.painType||[]).indexOf(t)>=0} onClick={function(){toggleArr("painType",t);}}/>;})}</div>
                  </div>
                )}
              </div>
            )}
            <NavButtons onBack={back} onNext={next} disabled={pd.hasPain===undefined||pd.hasPain===null}/>
          </div>
        )}
        {/* Q6 Illness */}
        {step===6&&(
          <div>
            <QTitle sub="Question 6 of 8" title="Are you feeling unwell or ill?"/>
            <ChoiceRow value={pd.illness?"yes":"no"}
              onChange={function(v){
                var np={};Object.keys(pd).forEach(function(k){np[k]=pd[k];});np.illness=v==="yes";np.illnessTypes=[];
                set("painData",np);
              }}
              options={[["yes","🤒 Yes",amber],["no","✅ No",green]]}/>
            {pd.illness&&(
              <div style={{marginTop:18}}>
                <Lbl>Type (select all that apply)</Lbl>
                <div>{ILLNESS.map(function(t){return <Chip key={t} label={t} color={amber} selected={(pd.illnessTypes||[]).indexOf(t)>=0} onClick={function(){toggleArr("illnessTypes",t);}}/>;})}</div>
              </div>
            )}
            <NavButtons onBack={back} onNext={next} disabled={pd.illness===undefined||pd.illness===null}/>
          </div>
        )}
        {/* Q7 Ready */}
        {step===7&&(
          <div>
            <QTitle sub="Question 7 of 8" title="Are you ready to train today?"/>
            <ChoiceRow value={f.readyToTrain} onChange={function(v){set("readyToTrain",v);}}
              options={[["yes","✅ Yes",green],["partial","⚡ Partially",amber],["no","❌ No",red]]}/>
            <NavButtons onBack={back} onNext={next} disabled={!f.readyToTrain}/>
          </div>
        )}
        {/* Q8 Comments */}
        {step===8&&(
          <div>
            <QTitle sub="Question 8 of 8" title="Anything we should know?"/>
            <div style={{fontSize:13,color:muted,marginBottom:12}}>Sleep, stress, travel, illness, etc.</div>
            <textarea value={f.comments} onChange={function(e){set("comments",e.target.value);}}
              placeholder="Optional — add a comment..."
              style={{width:"100%",padding:"14px",borderRadius:12,border:"1.5px solid "+border,
                fontSize:14,minHeight:110,resize:"none",color:navy,background:faint,outline:"none"}}/>
            <NavButtons onBack={back} onNext={submitForm} nextLabel="SUBMIT ✓"/>
          </div>
        )}
      </Card>
    </div>
  );
}

// ── PIN SCREEN ────────────────────────────────────────────
function PinScreen(props){
  var ps=useState(""); var p=ps[0],setP=ps[1];
  var es=useState(false); var err=es[0],setErr=es[1];
  function check(){if(p===PIN){props.onUnlock();}else{setErr(true);setP("");}}
  return (
    <div className="fade" style={{maxWidth:340,margin:"72px auto",padding:"0 16px",textAlign:"center"}}>
      <div style={{background:navy,borderRadius:20,padding:"28px 24px",marginBottom:20,
        boxShadow:"0 4px 20px rgba(15,31,61,0.18)"}}>
        <div style={{fontFamily:DISP,fontSize:44,fontWeight:700,color:yellow,letterSpacing:4}}>AIK</div>
        <div style={{color:"#7b93bc",fontSize:13,marginTop:4}}>Staff access only</div>
      </div>
      <input type="password" value={p}
        onChange={function(e){setP(e.target.value);setErr(false);}}
        onKeyDown={function(e){if(e.key==="Enter")check();}}
        placeholder="Enter PIN"
        style={{width:"100%",padding:16,textAlign:"center",fontSize:24,letterSpacing:10,
          border:"2px solid "+(err?red:border),borderRadius:14,outline:"none",
          marginBottom:10,background:white,color:navy}}/>
      {err&&<p style={{color:red,fontSize:13,margin:"0 0 10px"}}>Incorrect PIN.</p>}
      <button onClick={check} style={{width:"100%",padding:15,background:navy,color:yellow,
        border:"none",borderRadius:14,fontFamily:DISP,fontSize:17,fontWeight:700,
        letterSpacing:1,cursor:"pointer",marginTop:4}}>UNLOCK DASHBOARD</button>

    </div>
  );
}

// ── ROSTER MANAGER ────────────────────────────────────────
function RosterManager(props){
  var players=props.players,onUpdate=props.onUpdate;
  var ns=useState(""); var newName=ns[0],setNewName=ns[1];
  var ss=useState(""); var search=ss[0],setSearch=ss[1];
  var cs=useState(null); var confirm=cs[0],setConfirm=cs[1];
  var sorted=players.slice().sort(function(a,b){return a.split(" ").pop().localeCompare(b.split(" ").pop());});
  var filtered=sorted.filter(function(p){return p.toLowerCase().indexOf(search.toLowerCase())>=0;});
  function save(u){saveLS(PLAYERS_KEY,u);onUpdate(u);}
  function add(){var n=newName.trim();if(!n||players.indexOf(n)>=0)return;save(players.concat([n]));setNewName("");}
  function remove(name){save(players.filter(function(p){return p!==name;}));setConfirm(null);}
  return (
    <div>
      <div style={{background:white,borderRadius:16,padding:18,marginBottom:12,boxShadow:"0 1px 6px rgba(15,31,61,0.07)"}}>
        <div style={{fontFamily:DISP,fontSize:14,fontWeight:600,color:navy,letterSpacing:1,marginBottom:12}}>ADD PLAYER</div>
        <div style={{display:"flex",gap:8}}>
          <input value={newName} onChange={function(e){setNewName(e.target.value);}}
            onKeyDown={function(e){if(e.key==="Enter")add();}} placeholder="Full name..."
            style={{flex:1,padding:"11px 14px",borderRadius:10,border:"1.5px solid "+border,
              fontSize:14,color:navy,background:faint,outline:"none"}}/>
          <button onClick={add} style={{padding:"11px 18px",background:navy,color:yellow,border:"none",
            borderRadius:10,fontFamily:DISP,fontSize:14,fontWeight:700,cursor:"pointer"}}>ADD</button>
        </div>
      </div>
      <div style={{background:white,borderRadius:16,padding:18,boxShadow:"0 1px 6px rgba(15,31,61,0.07)"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
          <div style={{fontFamily:DISP,fontSize:14,fontWeight:600,color:navy}}>{"SQUAD — "+players.length}</div>
          <input value={search} onChange={function(e){setSearch(e.target.value);}} placeholder="Search..."
            style={{padding:"7px 12px",borderRadius:8,border:"1.5px solid "+border,
              fontSize:13,color:navy,background:faint,outline:"none",width:120}}/>
        </div>
        {filtered.map(function(p){
          return (
            <div key={p} style={{display:"flex",justifyContent:"space-between",alignItems:"center",
              padding:"11px 12px",borderRadius:10,background:faint,
              border:"1px solid "+(confirm===p?red:border),marginBottom:6}}>
              <span style={{fontSize:14,color:navy,fontWeight:500}}>{p}</span>
              {confirm===p?(
                <div style={{display:"flex",gap:6,alignItems:"center"}}>
                  <span style={{fontSize:12,color:red,fontWeight:600}}>Remove?</span>
                  <button onClick={function(){remove(p);}} style={{padding:"5px 12px",background:red,color:white,border:"none",borderRadius:6,fontSize:12,fontWeight:700,cursor:"pointer"}}>Yes</button>
                  <button onClick={function(){setConfirm(null);}} style={{padding:"5px 12px",background:border,color:muted,border:"none",borderRadius:6,fontSize:12,fontWeight:700,cursor:"pointer"}}>No</button>
                </div>
              ):(
                <button onClick={function(){setConfirm(p);}} style={{padding:"5px 12px",background:"transparent",color:muted,border:"1px solid "+border,borderRadius:6,fontSize:12,cursor:"pointer"}}>Remove</button>
              )}
            </div>
          );
        })}
        {filtered.length===0&&<div style={{textAlign:"center",color:muted,padding:24,fontSize:13}}>No players found</div>}
      </div>
    </div>
  );
}

// ── DASHBOARD ─────────────────────────────────────────────
function Dashboard(props){
  var subs=props.subs,players=props.players,onExport=props.onExport,onPlayersUpdate=props.onPlayersUpdate,onClearDay=props.onClearDay;
  var ts=useState("overview"); var tab=ts[0],setTab=ts[1];
  var flagged=subs.filter(isFlagged);
  var withPain=subs.filter(function(s){return s.painData&&s.painData.hasPain;}).length;
  var withIllness=subs.filter(function(s){return s.painData&&s.painData.illness;}).length;
  var total=subs.length;

  function formatPain(s){
    var pd=s.painData;if(!pd||!pd.hasPain)return null;
    var side=pd.side?"["+pd.side+"]":"";
    var areas=(pd.muscles||[]).concat(pd.central||[]).join(", ");
    var type=(pd.painType||[]).join(", ");
    return [side,areas,type].filter(function(x){return x;}).join(" · ")||"Reported";
  }

  var TABS=[["overview","Overview"],["players","Players"],["flags","🚨 Flags ("+flagged.length+")"],["roster","👥 Roster"]];

  return (
    <div>
      {/* Header */}
      <div style={{background:navy,borderRadius:16,padding:"16px 18px",marginBottom:14,
        display:"flex",justifyContent:"space-between",alignItems:"center",
        boxShadow:"0 4px 16px rgba(15,31,61,0.15)"}}>
        <div>
          <div style={{fontFamily:DISP,fontSize:28,fontWeight:700,color:yellow,letterSpacing:2,lineHeight:1}}>AIK</div>
          <div style={{fontSize:12,color:"#7b93bc",marginTop:3}}>{new Date().toLocaleDateString("en-GB",{weekday:"long",day:"numeric",month:"long"})}</div>
        </div>
        <div style={{display:"flex",gap:8}}>
          <button onClick={onExport} style={{padding:"9px 14px",background:yellow,color:navy,border:"none",borderRadius:10,fontFamily:DISP,fontSize:13,fontWeight:700,cursor:"pointer"}}>⬇ CSV</button>
          <button onClick={onClearDay} style={{padding:"9px 14px",background:"#1e3a6e",color:"#7b93bc",border:"none",borderRadius:10,fontFamily:DISP,fontSize:13,fontWeight:600,cursor:"pointer"}}>Clear</button>
        </div>
      </div>

      {/* Stats */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:8,marginBottom:14}}>
        {[
          ["Done",total+"/"+players.length,total===players.length?green:navy],
          ["Flags",flagged.length,flagged.length?red:green],
          ["Pain",withPain,withPain?red:green],
          ["Ill",withIllness,withIllness?amber:green]
        ].map(function(item){
          return (
            <div key={item[0]} style={{background:white,borderRadius:14,padding:"13px 8px",
              textAlign:"center",boxShadow:"0 1px 4px rgba(15,31,61,0.07)",borderTop:"3px solid "+item[2]}}>
              <div style={{fontSize:20,fontWeight:900,color:item[2]}}>{item[1]}</div>
              <div style={{fontSize:10,fontWeight:700,color:muted,textTransform:"uppercase",letterSpacing:0.4,marginTop:2}}>{item[0]}</div>
            </div>
          );
        })}
      </div>

      {/* Tabs */}
      <div style={{display:"flex",gap:3,background:"#e2e8f0",borderRadius:12,padding:4,marginBottom:14}}>
        {TABS.map(function(t){
          return (
            <button key={t[0]} onClick={function(){setTab(t[0]);}} style={{
              flex:1,padding:"9px 3px",borderRadius:8,border:"none",
              background:tab===t[0]?navy:"transparent",
              color:tab===t[0]?yellow:muted,
              fontWeight:tab===t[0]?700:500,cursor:"pointer",fontSize:11
            }}>{t[1]}</button>
          );
        })}
      </div>

      {total===0&&tab!=="roster"&&(
        <div style={{background:white,borderRadius:16,padding:48,textAlign:"center",color:muted,
          boxShadow:"0 1px 4px rgba(15,31,61,0.07)"}}>No submissions yet...</div>
      )}

      {/* OVERVIEW */}
      {tab==="overview"&&total>0&&(
        <div style={{background:white,borderRadius:16,padding:18,boxShadow:"0 1px 4px rgba(15,31,61,0.07)"}}>
          <div style={{fontFamily:DISP,fontSize:14,fontWeight:600,color:navy,letterSpacing:1,marginBottom:14}}>TEAM AVERAGES</div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:8}}>
            {[["Fatigue","fatigue"],["Sleep","sleepQuality"],["Appetite","appetite"],["Soreness","soreness"]].map(function(pair){
              return <ScorePill key={pair[0]} label={pair[0]} value={parseFloat(avgVal(subs,pair[1]))}/>;
            })}
          </div>
        </div>
      )}

      {/* PLAYERS */}
      {tab==="players"&&total>0&&subs.map(function(s){
        var pain=formatPain(s);var fl=isFlagged(s);var pd=s.painData||{};
        return (
          <div key={s.player} style={{background:white,borderRadius:16,padding:16,marginBottom:10,
            boxShadow:"0 1px 4px rgba(15,31,61,0.07)",borderLeft:"4px solid "+(fl?red:green)}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
              <div style={{display:"flex",alignItems:"center",gap:8}}>
                <span style={{fontWeight:800,color:navy}}>{s.player}</span>
                {fl&&<Tag col={red}>FLAGGED</Tag>}
              </div>
              <span style={{fontSize:11,color:muted}}>{s.timestamp}</span>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(5,1fr)",gap:6,marginBottom:10}}>
              <ScorePill label="Fatigue" value={s.fatigue}/>
              <ScorePill label="Sleep" value={s.sleepQuality}/>
              <ScorePill label="Appetite" value={s.appetite}/>
              <ScorePill label="Soreness" value={s.soreness}/>
              <div style={{textAlign:"center",background:faint,borderRadius:10,padding:"8px 4px"}}>
                <div style={{fontSize:9,color:muted,fontWeight:800,textTransform:"uppercase"}}>Ready</div>
                <div style={{fontSize:20,marginTop:3}}>{s.readyToTrain==="yes"?"✅":s.readyToTrain==="partial"?"⚡":"❌"}</div>
              </div>
            </div>
            {s.hoursSlept&&<div style={{fontSize:12,color:muted,marginBottom:6}}>{"🛏 Slept: "+s.hoursSlept+"h"}</div>}
            {pain&&<div style={{fontSize:12,marginBottom:6,padding:"7px 10px",background:red+"10",borderRadius:8,color:red}}>{"⚠️ Pain: "+pain}</div>}
            {pd.illness&&<div style={{fontSize:12,marginBottom:6,padding:"7px 10px",background:amber+"10",borderRadius:8,color:amber}}>{"🤒 "+((pd.illnessTypes||[]).join(", ")||"Illness reported")}</div>}
            {s.comments&&<div style={{fontSize:12,color:muted,background:faint,borderRadius:8,padding:"8px 12px"}}>{"💬 "+s.comments}</div>}
          </div>
        );
      })}

      {/* FLAGS */}
      {tab==="flags"&&total>0&&(
        flagged.length===0?(
          <div style={{background:white,borderRadius:16,padding:48,textAlign:"center",boxShadow:"0 1px 4px rgba(15,31,61,0.07)"}}>
            <div style={{fontSize:40,marginBottom:12}}>🎉</div>
            <div style={{fontWeight:700,color:green,fontSize:15}}>No flags today — team looking good!</div>
          </div>
        ):flagged.map(function(s){
          var pain=formatPain(s);var pd=s.painData||{};
          return (
            <div key={s.player} style={{background:white,borderRadius:16,padding:16,marginBottom:10,
              boxShadow:"0 1px 4px rgba(15,31,61,0.07)",borderLeft:"4px solid "+red}}>
              <div style={{fontWeight:800,color:navy,marginBottom:10}}>{s.player}</div>
              <div style={{display:"flex",flexWrap:"wrap"}}>
                {s.fatigue<=2&&<Tag col={red}>{"Low energy ("+s.fatigue+"/5)"}</Tag>}
                {s.sleepQuality<=2&&<Tag col={red}>{"Poor sleep ("+s.sleepQuality+"/5)"}</Tag>}
                {s.soreness<=2&&<Tag col={red}>{"High soreness ("+s.soreness+"/5)"}</Tag>}
                {s.appetite<=2&&<Tag col={amber}>{"Poor appetite ("+s.appetite+"/5)"}</Tag>}
                {pain&&<Tag col={red}>{"Pain: "+pain}</Tag>}
                {pd.illness&&<Tag col={amber}>{(pd.illnessTypes||[]).join(", ")||"Illness"}</Tag>}
                {s.readyToTrain==="no"&&<Tag col={red}>Not ready</Tag>}
                {s.readyToTrain==="partial"&&<Tag col={amber}>Partially ready</Tag>}
              </div>
              {s.comments&&<div style={{fontSize:12,color:muted,background:faint,borderRadius:8,padding:"8px 12px",marginTop:8}}>{"💬 "+s.comments}</div>}
            </div>
          );
        })
      )}

      {/* ROSTER */}
      {tab==="roster"&&<RosterManager players={players} onUpdate={onPlayersUpdate}/>}
    </div>
  );
}

// ── APP ───────────────────────────────────────────────────
function App(){
  var vs=useState("player"); var view=vs[0],setView=vs[1];
  var us=useState(false); var unlocked=us[0],setUnlocked=us[1];
  var subS=useState(function(){return loadTodaySubs();}); var subs=subS[0],setSubs=subS[1];
  var pls=useState(function(){return loadLS(PLAYERS_KEY,DEFAULT_PLAYERS);}); var players=pls[0],setPlayers=pls[1];

  function handleSubmit(f){
    var sub=Object.assign({},f,{date:todayDate(),timestamp:nowTime()});
    var updated=subs.filter(function(s){return s.player!==f.player;}).concat([sub]);
    setSubs(updated);saveLS(SUBS_KEY,updated);
    sendToSheet(sub);
  }

  function clearDay(){
    if(window.confirm("Clear all of today's submissions?")){setSubs([]);saveLS(SUBS_KEY,[]);}
  }

  function exportCSV(){
    var h="Date,Player,Time,Fatigue,Sleep Quality,Hours Slept,Appetite,Soreness,Pain,Pain Side,Pain Areas,Pain Type,Illness,Illness Types,Ready,Comments";
    var rows=subs.map(function(s){
      var pd=s.painData||{};
      var areas=(pd.muscles||[]).concat(pd.central||[]).join("; ");
      return '"'+(s.date||todayDate())+'","'+s.player+'","'+s.timestamp+'",'+s.fatigue+','+s.sleepQuality+',"'+(s.hoursSlept||"")+'",'+s.appetite+','+s.soreness+',"'+(pd.hasPain?"Yes":"No")+'","'+(pd.side||"")+'","'+areas+'","'+((pd.painType||[]).join("; "))+'","'+(pd.illness?"Yes":"No")+'","'+((pd.illnessTypes||[]).join("; "))+'","'+s.readyToTrain+'","'+(s.comments||"").replace(/"/g,"'")+'"';
    });
    var blob=new Blob([[h].concat(rows).join("\n")],{type:"text/csv"});
    var a=document.createElement("a");
    a.href=URL.createObjectURL(blob);
    a.download="AIK_wellness_"+new Date().toISOString().split("T")[0]+".csv";
    a.click();
  }

  return (
    <div style={{minHeight:"100vh",background:bg}}>
      <nav style={{background:navy,borderBottom:"2px solid "+gold,
        padding:"12px 18px",display:"flex",justifyContent:"space-between",
        alignItems:"center",position:"sticky",top:0,zIndex:10}}>
        <span style={{fontFamily:DISP,fontWeight:700,fontSize:20,color:yellow,letterSpacing:2}}>AIK</span>
        <div style={{display:"flex",gap:6}}>
          {[["player","Check-in"],["staff","Staff 🔒"]].map(function(item){
            return (
              <button key={item[0]} onClick={function(){setView(item[0]);}} style={{
                padding:"7px 14px",borderRadius:8,
                border:"1.5px solid "+(view===item[0]?yellow:"#1e3a6e"),
                background:view===item[0]?yellow:"transparent",
                color:view===item[0]?navy:"#7b93bc",
                fontWeight:700,cursor:"pointer",fontSize:13
              }}>{item[1]}</button>
            );
          })}
        </div>
      </nav>
      <div style={{maxWidth:480,margin:"0 auto",padding:"20px 14px 40px"}}>
        {view==="player"
          ? <PlayerFlow players={players} subs={subs} onSubmit={handleSubmit}/>
          : (unlocked
              ? <Dashboard subs={subs} players={players} onExport={exportCSV} onPlayersUpdate={setPlayers} onClearDay={clearDay}/>
              : <PinScreen onUnlock={function(){setUnlocked(true);}}/>)
        }
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App,null));
</script>
</body>
</html>
